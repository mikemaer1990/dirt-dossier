services:
  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dirt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dirt}
      POSTGRES_DB: ${POSTGRES_DB:-dirt_dossier}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dirt} -d ${POSTGRES_DB:-dirt_dossier}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
